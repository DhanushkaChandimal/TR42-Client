swagger: '2.0'
info:
  title: "Client Web Dashboard"
  description: "Backend API providing authentication, data management, and business logic services for the Client Web Dashboard with JWT-based security."
  version: "1.0.0"
host: "127.0.0.1:5000"
schemes:
  - "http"
  # - "https"
consumes:
  - "application/json"
produces:
  - "application/json"

securityDefinitions:
  bearerAuth:
    type: apiKey
    name: Authorization
    in: header

paths:
  /users/login:
    post:
      tags:
        - Users
      summary: "Login endpoint, (generates token)"
      description: "Validates user credentials and returns a user-specific token."
      parameters:
        - in: "body"
          name: "body"
          description: "Login credentials"
          required: true
          schema:
            $ref: "#/definitions/LoginCredentials"
      responses:
        200:
          description: "Login Successful"
          schema:
            $ref: "#/definitions/LoginResponse"
          examples:
            application/json:
              message: "Successfully Logged In"
              status: "success"
              token: "eyJhbGciOiJIUzI1NiIsInR5cCI6I..."
        400:
          description: "Invalid request payload"
          schema:
            $ref: "#/definitions/LoginValidationError"
          examples:
            application/json:
              email:
                - "Not a valid email address."
              password:
                - "Missing data for required field."
        401:
          description: "Invalid credentials"
          schema:
            $ref: "#/definitions/LoginError"
          examples:
            application/json:
              message: "Invalid email or password"

  /users/verify-token:
    get:
      tags:
        - Users
      summary: "Verify JWT token validity"
      description: "Checks if the provided JWT token is valid. Requires Authorization header."
      security:
        - bearerAuth: []
      responses:
        200:
          description: "Token is valid"
          schema:
            $ref: "#/definitions/VerifyTokenResponse"
          examples:
            application/json:
              message: "Token is valid!"
              user_id: "123"
        400:
          description: "Token is missing, expired, or invalid"
          schema:
            $ref: "#/definitions/VerifyTokenError"
          examples:
            application/json:
              message: "Token is missing!"
        401:
          description: "Unauthorized"
          schema:
            $ref: "#/definitions/VerifyTokenError"
          examples:
            application/json:
              message: "Invalid token!"

definitions:

  VerifyTokenResponse:
    type: "object"
    properties:
      message:
        type: "string"
      user_id:
        type: "string"

  VerifyTokenError:
    type: "object"
    properties:
      message:
        type: "string"

  LoginCredentials:
    type: "object"
    properties:
      email:
        type: "string"
      password:
        type: "string"

    required:
      - email
      - password

  LoginResponse:
    type: "object"
    properties:
      token:
        type: "string"
      message:
        type: "string"
      status:
        type: "string"

  LoginValidationError:
    type: "object"
    properties:
      email:
        type: "array"
        items:
          type: "string"
      password:
        type: "array"
        items:
          type: "string"

  LoginError:
    type: "object"
    properties:
      message:
        type: "string"
